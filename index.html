<!DOCTYPE html>
<html>
<head>
  <title>Portal Tracker</title>
  <style>
    body { font-family: Arial; background:#111; color:#eee; }
    input, select { margin: 5px; padding: 6px; }
    table { width:100%; border-collapse: collapse; margin-top:10px; }
    th, td { padding:8px; border-bottom:1px solid #333; text-align:left; }
    th { cursor:pointer; }
  </style>
</head>
<body>

<h2>Portal Tracker</h2>

<input id="search" placeholder="Search name or school">

<select id="position">
  <option value="">All Positions</option>
</select>

<select id="class">
  <option value="">All Classes</option>
</select>

<select id="status">
  <option value="">All</option>
  <option value="committed">Committed</option>
  <option value="available">Available</option>
</select>

<table>
  <thead id="thead"></thead>
  <tbody id="tbody"></tbody>
</table>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2i9QCMFfi0RJoIVc59UgyB5cq8_badD3ML-auKtOSXSY7VNnQ7Eb1AwpW8E16v_j1YalctfhQxnf4/pub?gid=641456151&single=true&output=csv";

let data = [];
let filtered = [];

async function loadData() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(","));
  const headers = rows[0];

  data = rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = row[i]);
    return obj;
  }).filter(r => r["Name"]);

  filtered = data;

  buildFilters();
  renderTable();
}

function buildFilters() {
  const posSet = new Set(data.map(d => d["Position"]).filter(Boolean));
  const classSet = new Set(data.map(d => d["Class"]).filter(Boolean));

  const posSelect = document.getElementById("position");
  const classSelect = document.getElementById("class");

  posSet.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p;
    opt.textContent = p;
    posSelect.appendChild(opt);
  });

  classSet.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    classSelect.appendChild(opt);
  });
}

function applyFilters() {
  const search = document.getElementById("search").value.toLowerCase();
  const pos = document.getElementById("position").value;
  const cls = document.getElementById("class").value;
  const status = document.getElementById("status").value;

  filtered = data.filter(d => {
    if (search && !(d["Name"]||"").toLowerCase().includes(search)) return false;
    if (pos && d["Position"] !== pos) return false;
    if (cls && d["Class"] !== cls) return false;

    const committed = d["New School"] && d["New School"] !== "";

    if (status === "committed" && !committed) return false;
    if (status === "available" && committed) return false;

    return true;
  });

  renderTable();
}

function renderTable() {
  const thead = document.getElementById("thead");
  const tbody = document.getElementById("tbody");

  if (!data.length) return;

  const headers = Object.keys(data[0]);

  thead.innerHTML = "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>";

  tbody.innerHTML = filtered.map(row => {
    return "<tr>" + headers.map(h => `<td>${row[h] || ""}</td>`).join("") + "</tr>";
  }).join("");
}

document.getElementById("search").oninput = applyFilters;
document.getElementById("position").onchange = applyFilters;
document.getElementById("class").onchange = applyFilters;
document.getElementById("status").onchange = applyFilters;

loadData();
</script>

</body>
</html>
